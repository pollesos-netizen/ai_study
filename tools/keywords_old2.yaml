# 사내 업무 민감정보 C/S/O 분류 후보 추출 키워드 설정 v2
# 목적:
#   - 결정론적으로 탐지 가능한 식별자류(IP, VLAN, 포트, 계정, 비밀번호 등)는
#     regex_identifier 경로로 분리한다.
#   - AI/skeleton 학습 후보는 패턴이 없는 '서술형 업무 민감 문장'으로 좁힌다.
#
# 후보 판정 원칙:
#   1. strong_procedural 또는 s_business_sensitive가 있으면 AI 후보
#   2. ambiguous_action은 operational_anchor와 함께 있을 때만 AI 후보
#   3. weak는 단독/weak끼리 후보 생성 금지. AI 후보가 된 뒤 reason 보조 정보로만 포함
#   4. regex 식별자만 있는 TextUnit은 regex_identifier로만 분리하고 AI 후보에서 제외

ai_tracks:

  # 단독으로도 C급 서술형 업무 민감 후보가 될 수 있는 구체 절차/조작/구성 표현
